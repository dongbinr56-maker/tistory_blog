name: Daily Tistory newsroom draft

on:
  schedule:
    # GitHub Actions cron은 UTC입니다. 22:00 UTC = 매일 07:00 KST.
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      run_date:
        description: 'Optional YYYY-MM-DD (defaults to today in Asia/Seoul)'
        required: false
        type: string
      refresh:
        description: 'Regenerate and overwrite an already review-ready draft for the chosen date'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-tistory-newsroom
  cancel-in-progress: false

jobs:
  build-draft:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      GH_API_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate reviewable draft and enforce quality gate
        env:
          RUN_DATE: ${{ inputs.run_date }}
          REFRESH_FLAG: ${{ inputs.refresh }}
        run: |
          set -euo pipefail
          args=()
          case "$REFRESH_FLAG" in
            true) args+=(--refresh) ;;
            false|"") ;;
            *) echo "Invalid refresh input" >&2; exit 2 ;;
          esac
          if [ -n "$RUN_DATE" ]; then
            if ! [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "run_date must use YYYY-MM-DD" >&2
              exit 2
            fi
            args+=(--date "$RUN_DATE")
          fi
          PYTHONPATH=src python -m tistory_newsroom run "${args[@]}"

      - name: Commit daily source records and draft
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/runs docs
          if [ -d data/history ]; then
            git add data/history
          fi
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Daily Tistory draft: $(TZ=Asia/Seoul date +%F)"
            git push
          fi

      - name: Summarize a blocked or failed draft
        if: failure()
        run: |
          {
            echo "## Daily draft generation failed"
            echo
            echo "The existing published review draft was left unchanged. Review the failed generation step and the committed data/runs audit record."
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
