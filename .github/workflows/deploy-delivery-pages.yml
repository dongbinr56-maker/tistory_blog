name: Deploy Tistory delivery assets

on:
  push:
    branches:
      - main
    paths:
      - 'docs/tistory/assets/deliveries/**'
      - '.github/workflows/deploy-delivery-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: tistory-delivery-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
