-items:stretch;flex-direction:column}.copy{width:100%}textarea{min-height:400px}iframe{height:520px}}
</style></head><body><main><header><h1>티스토리 초안 검토</h1><p class="muted">기본 화면은 HTML 소스입니다. 티스토리 글쓰기의 HTML 모드에 그대로 붙여넣고, View에서 실제 렌더링 결과를 확인하세요.</p><a class="policy-link" href="tistory-pages/index.html">티스토리 정책 페이지 복사본</a> · <a class="policy-link" href="adsense-checklist.html">애드센스 발행 전 체크리스트</a></header><div class="layout"><aside class="panel" id="list" aria-label="초안 날짜 목록"></aside><section class="panel" id="detail" aria-live="polite"></section></div></main>
<script>
const drafts=[{"date": "2026-07-11", "title": "Anthropic Fable 5 활용 가이드와 HimitsuShell: AI/ML 엔지니어링의 현재와 미래", "title_candidates": ["Fable 5 활용 가이드와 HimitsuShell: 2026년 7월 11일 AI/ML 엔지니어 동향", "Anthropic Fable 5의 현황과 HimitsuShell로 본 스크립트 보안", "AI 개발 도구 Fable 5와 셸 스크립트 보호 HimitsuShell 업데이트"], "tags": ["생성형 AI", "개발 도구", "Fable 5", "Anthropic", "셸 스크립트", "보안", "HimitsuShell", "AI 엔지니어링"], "meta_description": "2026년 7월 11일, Anthropic Fable 5의 최신 활용 가이드와 셸 스크립트 보안을 강화하는 HimitsuShell 프로젝트를 심층 분석합니다. AI/ML 엔지니어를 위한 필수 기술 동향을 놓치지 마세요.", "article_count_note": "오늘은 기준을 충족한 기사가 2건이었다. 아쉽게도 3개 미만이므로, 모든 항목을 다루지는 못했지만, 핵심적인 두 가지 이슈를 밀도 있게 분석했다.", "quality_status": "READY_FOR_MANUAL_REVIEW", "manual_review_required": true, "publish_checklist": ["원문 링크와 사실관계를 확인합니다.", "작성자 분석이 자신의 실제 관점인지 검토합니다.", "관련된 기존 글이 있다면 발행 전 본문 끝에 내부 링크를 1개 이상 추가하세요.", "소개·문의·개인정보 페이지가 실제 값으로 공개됐는지 확인합니다.", "티스토리 HTML 모드에 붙여넣은 뒤 모바일 화면을 확인합니다."], "sources": [{"name": "HimitsuShell", "title": "HimitsuShell – Shell Script Compiler, Obfuscation & DRM", "url": "https://himitsushell.com/"}, {"name": "요즘IT", "title": "페이블 D-2, 앤트로픽 엔지니어가 알려주는 활용 가이드 | 요즘IT", "url": "https://yozm.wishket.com/magazine/detail/3848"}], "images": {"hero": {"path": "hero.svg", "url": "https://dongbinr56-maker.github.io/tistory_blog/tistory/assets/2026-07-11/hero.svg", "kind": "generated-hero"}, "geeknews-8ebcb2040a6aa5a9": {"origin_url": "https://himitsushell.com/img/og-image.png?v=1783749310876", "kind": "source-image", "path": "issue-1.png", "url": "https://dongbinr56-maker.github.io/tistory_blog/tistory/assets/2026-07-11/issue-1.png"}, "요즘it-c0902b6ef178e4f9": {"origin_url": "https://yozm.wishket.com/media/news/3848/3.jfif", "kind": "source-image", "path": "issue-2.jpg", "url": "https://dongbinr56-maker.github.io/tistory_blog/tistory/assets/2026-07-11/issue-2.jpg"}}, "html_path": "tistory/2026-07-11.html"}];
const list=document.querySelector('#list'),detail=document.querySelector('#detail');
let current=null,currentHtml='';
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));}
function values(value){return Array.isArray(value)?value:[];}
function status(text){const target=document.querySelector('#status');if(target)target.textContent=text;}
function setTab(name){
  detail.querySelectorAll('[role="tab"]').forEach(tab=>{const active=tab.dataset.tab===name;tab.setAttribute('aria-selected',String(active));tab.tabIndex=active?0:-1;});
  detail.querySelectorAll('[data-pane]').forEach(pane=>pane.hidden=pane.dataset.pane!==name);
}
async function copyText(text,label){
  try{await navigator.clipboard.writeText(text);}catch(error){const code=document.querySelector('#html-code');if(!code)throw error;code.focus();code.select();document.execCommand('copy');}
  status(`${label} 복사 완료`);
}
function renderDetail(raw){
  const d={title:escapeHtml(raw.title),date:escapeHtml(raw.date),tags:values(raw.tags).map(escapeHtml),candidates:values(raw.title_candidates).map(escapeHtml),quality:escapeHtml(raw.quality_status),checks:values(raw.publish_checklist).map(escapeHtml)};
  detail.innerHTML=`<h2>${d.title}</h2><div class="field"><b>제목 후보</b>${d.candidates.map(item=>`• ${item}`).join('<br>')}<br><button class="copy" id="copy-title">제목 복사</button></div><div class="field"><b>태그</b>${d.tags.join(', ')}<br><button class="copy" id="copy-tags">태그 복사</button></div><div class="field"><b>품질 상태</b>${d.quality} · 사람 검토 필수</div><div class="field"><b>발행 전 확인</b><ul>${d.checks.map(item=>`<li>${item}</li>`).join('')}</ul></div><div class="tabs" role="tablist" aria-label="본문 표시 방식"><button class="tab" role="tab" aria-selected="true" aria-controls="html-pane" id="html-tab" data-tab="html">HTML</button><button class="tab" role="tab" aria-selected="false" aria-controls="view-pane" id="view-tab" data-tab="view" tabindex="-1">View</button></div><section class="tab-pane" id="html-pane" data-pane="html" role="tabpanel" aria-labelledby="html-tab"><div class="pane-head"><p>아래 소스를 티스토리 글쓰기의 HTML 모드에 바로 붙여넣으세요.</p><button class="copy" id="copy-html">본문 HTML 복사</button></div><textarea id="html-code" aria-label="티스토리 본문 HTML" readonly>불러오는 중...</textarea></section><section class="tab-pane" id="view-pane" data-pane="view" role="tabpanel" aria-labelledby="view-tab" hidden><div class="pane-head"><p>HTML 탭의 동일한 원본을 렌더링한 미리보기입니다.</p></div><iframe id="article-view" title="${d.date} 블로그 본문 미리보기" referrerpolicy="no-referrer"></iframe></section><p class="status" id="status"></p>`;
  detail.querySelector('#copy-title').onclick=()=>copyText(raw.title,'제목');
  detail.querySelector('#copy-tags').onclick=()=>copyText(values(raw.tags).join(','),'태그');
  detail.querySelector('#copy-html').onclick=()=>copyText(currentHtml,'본문 HTML');
  detail.querySelectorAll('[role="tab"]').forEach(tab=>tab.onclick=()=>setTab(tab.dataset.tab));
  setTab('html');
}
async function selectDraft(raw){
  current=raw;currentHtml='';
  document.querySelectorAll('[data-date]').forEach(item=>item.classList.toggle('active',item.dataset.date===raw.date));
  renderDetail(raw);
  const code=detail.querySelector('#html-code'),frame=detail.querySelector('#article-view');
  try{const response=await fetch(raw.html_path+`?v=${Date.now()}`);if(!response.ok)throw new Error(`HTTP ${response.status}`);currentHtml=await response.text();code.value=currentHtml;frame.src=raw.html_path+`?v=${Date.now()}`;status(`${raw.date} 본문을 불러왔습니다. HTML 탭에서 복사할 수 있습니다.`);}catch(error){const message=`본문을 불러오지 못했습니다: ${error.message}`;code.value=message;frame.removeAttribute('src');status(message);}
}
drafts.forEach((draft,index)=>{const button=document.createElement('button');button.className='draft-button';button.dataset.date=draft.date;button.textContent=`${draft.date} — ${draft.title}`;button.onclick=()=>selectDraft(draft);list.append(button);if(!index)selectDraft(draft);});
if(!drafts.length)detail.innerHTML='<p>아직 생성된 초안이 없습니다.</p>';
</script></body></html>
